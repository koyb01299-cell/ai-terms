<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#bf4b2c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI 용어">
<title>AI 용어 · 발음 학습</title>
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<noscript><div style="background:#bf4b2c;color:#fff;padding:14px 18px;font-family:sans-serif;font-size:14px;text-align:center;">자바스크립트가 꺼져 있어 표시되지 않습니다. Safari·Chrome 등 일반 브라우저에서 열어주세요.</div></noscript>
<button class="gear-fab" id="gearBtn" aria-label="설정"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
<main class="screens">
  <section id="view-home" class="view on"></section>
  <section id="view-study" class="view"></section>
  <section id="view-browse" class="view">
    <h2 class="vh">AI 용어 사전</h2>
    <label class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="search" type="text" placeholder="용어 검색…"></label>
    <div class="chips" id="chips"></div>
    <div id="list"></div>
  </section>
  <section id="view-stats" class="view"></section>
</main>
<nav class="tabbar">
  <button class="tab on" data-v="home"><span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></span>홈</button>
  <button class="tab" data-v="study"><span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6" width="13" height="15" rx="2"/><path d="M8 6V4.5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-1.5"/></svg></span>학습</button>
  <button class="tab" data-v="browse"><span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>사전</button>
  <button class="tab" data-v="stats"><span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><rect x="5" y="11" width="3.5" height="7" rx="1"/><rect x="10.2" y="6" width="3.5" height="12" rx="1"/><rect x="15.5" y="13" width="3.5" height="5" rx="1"/></svg></span>통계</button>
</nav>
<div id="runner" class="runner"></div>
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div><h3>설정</h3>
  <div class="field"><label>표시 언어</label><div class="seg" id="langSeg"><button class="seg-btn" data-lang="ko">한국어</button><button class="seg-btn" data-lang="en">English</button></div></div>
  <div class="field"><label>발음 목소리</label><select id="voiceSel"></select>
    <p class="hint-text"><b>★</b> 추천 음성 · <b>✓</b> Safari에서 확실히 작동</p></div>
  <div class="field"><label>말하기 속도</label><div class="rate-wrap"><input id="rate" type="range" min="0.7" max="1.4" step="0.05" value="1"><b id="rateVal">1.00x</b></div></div>
  <div class="field"><button class="reset" id="resetBtn">외움·기록 전체 초기화</button></div>
</div>
<script src="js/data.js"></script>
<script src="js/examples.js"></script>
<script src="js/app.js"></script>
</body>
</html>
